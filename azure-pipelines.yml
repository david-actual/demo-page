trigger:
- main

resources:
- repo: self

variables:
- group: CICD
- name: appVersion
  value: $[variables.appVersion]
  
parameters:
- name: tag
  default: '$(Build.BuildId)'
- name: imageName
  default: 'demo-page'

stages:
- stage: CICD
  displayName: CICD Workflow
  jobs:
  - job: Build
    displayName: Build
    pool: local-agent

    steps:
    - task: Docker@2
      displayName: Build an image
      inputs:
        repository: ${{ parameters.imageName }}
        command: build
        dockerfile: '**/Dockerfile'
        tags: ${{ parameters.tag }}
        arguments: '--build-arg VERSION="$(appVersion)" '
        containerRegistry: registryConnection

    - task: Docker@2
      displayName: Push to ACR
      inputs:
        command: push
        containerRegistry: registryConnection
        repository: ${{ parameters.imageName }}
        tags: ${{ parameters.tag }}

  - job: Deploy
    displayName: Deploy
    dependsOn: Build
    pool: local-agent
    steps:
     - task: AzureContainerApps@1

       inputs:
         azureSubscription: appDeployConnection'
         imageToDeploy: acrappsdavid.azurecr.io/${{ parameters.imageName }}:$(Build.BuildId)

         containerAppName: 'app-demo-page' # NOMBRE DEL CONTAINER APP
         resourceGroup: kube

         acrUsername: $(acrUsername)
         acrPassword: $(acrPassword)